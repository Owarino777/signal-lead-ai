name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare static build
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          html = html.replace(
              "https://api.microlink.io https://*.microlink.io;",
              "https://api.microlink.io https://*.microlink.io https://signal-lead-ai.vercel.app;"
          )
          marker = '<script src="app.js" defer></script>'
          addition = marker + '\n  <script src="enrichment.js" defer></script>'
          if 'src="enrichment.js"' not in html:
              html = html.replace(marker, addition)
          path.write_text(html, encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
