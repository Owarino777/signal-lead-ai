name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare production frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          worker_origin = "https://signal-lead-api.malikcheikhpro14.workers.dev"

          index_path = Path("index.html")
          index_content = index_path.read_text(encoding="utf-8")
          if worker_origin not in index_content:
              raise SystemExit("Cloudflare Worker origin missing from index.html CSP")
          if '<script src="worker-client.js" defer></script>' not in index_content:
              raise SystemExit("worker-client.js is not loaded directly by index.html")

          enrichment_path = Path("fast-enrichment.js")
          enrichment_content = enrichment_path.read_text(encoding="utf-8")
          dynamic_loader = re.compile(
              r"\n\(function loadCloudflareClient\(\) \{[\s\S]*?\n\}\)\(\);\s*$"
          )
          enrichment_content, replacements = dynamic_loader.subn("\n", enrichment_content)
          if replacements != 1:
              raise SystemExit("Unexpected Cloudflare dynamic loader count")
          enrichment_path.write_text(enrichment_content, encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
